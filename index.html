<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador — Análisis de Sistemas Hidráulicos y Neumáticos Automatizados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#080d17;
  --bg-card:#0f1927;
  --bg-option:#162236;
  --bg-option-hover:#1e3050;
  --border:#1e3050;
  --border-light:#2a4570;
  --text:#dde6f5;
  --text-muted:#6b84a8;
  --accent-cyan:#00d4ff;
  --accent-green:#2dff9e;
  --accent-red:#ff4d6d;
  --accent-amber:#ffc847;
  --tag-comp:#00d4ff;
  --tag-valid:#a78bfa;
  --tag-mant:#ffc847;
  --tag-auto:#2dff9e;
  --tag-bomb:#ff9d5c;
  --radius:13px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg-base);
  background-image:
    radial-gradient(circle at 10% -5%, rgba(0,212,255,0.07) 0%, transparent 40%),
    radial-gradient(circle at 92% 8%, rgba(45,255,158,0.05) 0%, transparent 38%);
  color:var(--text);
  min-height:100vh;
  padding:24px 16px 60px;
  line-height:1.65;
}
.app{max-width:860px;margin:0 auto;}

/* ── TOPBAR ── */
.topbar{
  background:rgba(8,13,23,0.9);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 22px;
  margin-bottom:22px;
  position:sticky;top:10px;z-index:10;
}
.brand h1{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.3rem;letter-spacing:0.05em;text-transform:uppercase;color:#f0f6ff;
}
.brand p{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--text-muted);letter-spacing:0.04em;margin-top:4px;
}
.progress-row{
  display:flex;justify-content:space-between;align-items:center;
  margin:14px 0 8px;gap:8px;flex-wrap:wrap;
}
.mono-tag{
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);
}
.mono-tag.accent{color:var(--accent-cyan);}
.progress-track{
  position:relative;height:9px;
  background:var(--bg-option);border:1px solid var(--border);
  border-radius:6px;overflow:hidden;
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent-cyan),#5ef8ff);
  box-shadow:0 0 14px rgba(0,212,255,0.5);
  transition:width 0.45s ease;
}
.progress-track::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,transparent 0,transparent calc(100%/31 - 1px),
    var(--bg-base) calc(100%/31 - 1px),var(--bg-base) calc(100%/31)
  );
  pointer-events:none;
}

/* ── CARD ── */
.quiz-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px;
}
.fade-in{animation:fadeSlide 0.42s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.meta-row{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap;}
.badge{
  font-family:'JetBrains Mono',monospace;font-size:0.67rem;
  text-transform:uppercase;letter-spacing:0.09em;
  padding:5px 12px;border-radius:999px;
  border:1px solid var(--border-light);color:var(--text-muted);
  background:rgba(255,255,255,0.02);
}
.badge-type{color:var(--accent-cyan);border-color:var(--accent-cyan);background:rgba(0,212,255,0.08);}
.tag-comp{color:var(--tag-comp);border-color:var(--tag-comp);background:rgba(0,212,255,0.07);}
.tag-valid{color:var(--tag-valid);border-color:var(--tag-valid);background:rgba(167,139,250,0.08);}
.tag-mant{color:var(--tag-mant);border-color:var(--tag-mant);background:rgba(255,200,71,0.08);}
.tag-auto{color:var(--tag-auto);border-color:var(--tag-auto);background:rgba(45,255,158,0.07);}
.tag-bomb{color:var(--tag-bomb);border-color:var(--tag-bomb);background:rgba(255,157,92,0.08);}

.question-text{
  font-size:1.04rem;font-weight:500;color:#eaf2ff;margin-bottom:20px;
}

/* ── OPTIONS ── */
#optionsList{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.option{
  display:flex;align-items:flex-start;gap:13px;
  background:var(--bg-option);border:1px solid var(--border);
  border-left:4px solid transparent;border-radius:10px;
  padding:13px 15px;cursor:pointer;
  transition:transform 0.2s ease,background-color 0.2s ease,border-color 0.2s ease,box-shadow 0.2s ease;
}
.option:hover:not(.disabled){
  background:var(--bg-option-hover);border-color:var(--accent-cyan);
  border-left-color:var(--accent-cyan);transform:translateX(6px);
  box-shadow:0 4px 20px -4px rgba(0,212,255,0.3);
}
.option:focus-visible{outline:2px solid var(--accent-cyan);outline-offset:2px;}
.option.selected{
  border-color:var(--accent-cyan);border-left-color:var(--accent-cyan);
  background:rgba(0,212,255,0.06);
}
.option.disabled{cursor:default;}
.option.disabled:hover{transform:none;box-shadow:none;}
.option.correct-answer{
  border-color:var(--accent-green);border-left-color:var(--accent-green);
  background:rgba(45,255,158,0.07);box-shadow:0 4px 18px -4px rgba(45,255,158,0.28);
}
.option.incorrect-answer{
  border-color:var(--accent-red);border-left-color:var(--accent-red);
  background:rgba(255,77,109,0.07);box-shadow:0 4px 18px -4px rgba(255,77,109,0.28);
}
.option-letter{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.84rem;
  width:27px;height:27px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border-light);border-radius:6px;
  color:var(--text-muted);
  transition:color 0.2s,border-color 0.2s;
}
.option:hover:not(.disabled) .option-letter{color:var(--accent-cyan);border-color:var(--accent-cyan);}
.option.selected .option-letter{color:var(--accent-cyan);border-color:var(--accent-cyan);}
.option.correct-answer .option-letter{color:var(--accent-green);border-color:var(--accent-green);}
.option.incorrect-answer .option-letter{color:var(--accent-red);border-color:var(--accent-red);}
.option-text{font-size:0.94rem;padding-top:2px;}

/* ── FEEDBACK ── */
.feedback-panel{border-radius:10px;padding:15px 18px;margin-bottom:18px;border-left:4px solid;}
.feedback-correct{background:rgba(45,255,158,0.05);border-color:var(--accent-green);}
.feedback-incorrect{background:rgba(255,77,109,0.05);border-color:var(--accent-red);}
.feedback-label{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);
  display:block;margin-bottom:5px;
}
.feedback-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.04rem;
  letter-spacing:0.02em;margin-bottom:7px;
}
.feedback-correct .feedback-title{color:var(--accent-green);}
.feedback-incorrect .feedback-title{color:var(--accent-red);}
.feedback-justification{font-size:0.91rem;color:var(--text);opacity:0.92;}

/* ── BUTTONS ── */
.primary-btn{
  width:100%;padding:15px;border:none;border-radius:10px;
  background:var(--accent-cyan);color:#000d1a;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1rem;text-transform:uppercase;letter-spacing:0.07em;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s,background-color 0.2s;
}
.primary-btn:hover:not(:disabled){
  background:#33dcff;
  box-shadow:0 0 24px rgba(0,212,255,0.42);transform:translateY(-2px);
}
.primary-btn:disabled{
  background:var(--bg-option);color:var(--text-muted);cursor:not-allowed;
}
.secondary-btn{
  padding:13px 32px;border:1px solid var(--accent-cyan);
  background:transparent;color:var(--accent-cyan);border-radius:10px;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:0.07em;font-size:0.94rem;
  cursor:pointer;transition:background-color 0.2s,box-shadow 0.2s;
}
.secondary-btn:hover{background:rgba(0,212,255,0.08);box-shadow:0 0 20px rgba(0,212,255,0.22);}

/* ── RESULTS ── */
.results-screen{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:38px 26px;text-align:center;
}
.gauge-wrap{position:relative;width:200px;height:200px;margin:16px auto 12px;}
.gauge-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.gauge-track{fill:none;stroke:var(--border);stroke-width:13;}
.gauge-fill{
  fill:none;stroke:var(--accent-cyan);stroke-width:13;stroke-linecap:round;
  stroke-dasharray:534;stroke-dashoffset:534;
  transition:stroke-dashoffset 1.1s ease,stroke 0.4s ease;
}
.gauge-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.gauge-score{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2.4rem;color:#f0f6ff;}
.gauge-pct{font-family:'JetBrains Mono',monospace;font-size:0.82rem;color:var(--text-muted);letter-spacing:0.05em;}
.result-message{font-size:1rem;max-width:480px;margin:8px auto 26px;color:var(--text);}
.breakdown-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:28px;}
.led{
  width:34px;height:34px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:0.74rem;font-weight:700;border:1px solid;
}
.led-correct{background:rgba(45,255,158,0.09);border-color:var(--accent-green);color:var(--accent-green);}
.led-incorrect{background:rgba(255,77,109,0.09);border-color:var(--accent-red);color:var(--accent-red);}
[hidden]{display:none !important;}
@media(max-width:560px){
  .quiz-card{padding:18px;}
  .question-text{font-size:0.97rem;}
  .gauge-wrap{width:170px;height:170px;}
  .gauge-score{font-size:2rem;}
  .results-screen{padding:28px 16px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="app">

<header class="topbar">
  <div class="brand">
    <h1>⚙ Sistemas Hidráulicos y Neumáticos Automatizados</h1>
    <p>Simulador de examen · GMON32 · Mecánica Automotriz en Maquinaria Pesada</p>
  </div>
  <div class="progress-row">
    <span id="qCounter" class="mono-tag">PREGUNTA 1 / 15</span>
    <span id="scoreCounter" class="mono-tag accent">ACIERTOS 0/15</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</header>

<main>
  <section class="quiz-card fade-in" id="quizCard">
    <div class="meta-row">
      <span class="badge badge-type" id="typeBadge"></span>
      <span class="badge" id="categoryBadge"></span>
    </div>
    <p class="question-text" id="questionText"></p>
    <ul id="optionsList"></ul>
    <div class="feedback-panel" id="feedbackPanel" hidden>
      <span class="feedback-label">Análisis técnico</span>
      <div class="feedback-title" id="feedbackTitle"></div>
      <p class="feedback-justification" id="feedbackJustification"></p>
    </div>
    <button class="primary-btn" id="evalBtn" disabled>Evaluar Respuesta</button>
  </section>

  <section class="results-screen" id="resultsScreen" hidden>
    <span class="badge badge-type">Resultado Final</span>
    <div class="gauge-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="gauge-track" cx="100" cy="100" r="85"></circle>
        <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="85"></circle>
      </svg>
      <div class="gauge-text">
        <span class="gauge-score" id="resultScoreText">0/15</span>
        <span class="gauge-pct" id="resultPct">0%</span>
      </div>
    </div>
    <p class="result-message" id="resultMessage"></p>
    <div class="breakdown-grid" id="breakdownGrid"></div>
    <button class="secondary-btn" id="restartBtn">Reintentar Simulador</button>
  </section>
</main>

</div>
<script>
const questions = [
  // ─── BLOQUE 1: COMPONENTES Y ACEITE HIDRÁULICO ───
  {
    category:"Componentes Hidráulicos · Aceite",
    tagClass:"tag-comp",
    type:"Tecnicismo",
    question:"El aceite hidráulico cumple múltiples funciones en un sistema oleohidráulico. ¿Cuál de las siguientes listas describe CORRECTAMENTE las cinco funciones principales que debe cumplir un fluido hidráulico en maquinaria pesada?",
    options:[
      "Generar presión, aumentar temperatura, producir caudal, ionizar partículas y crear vacío en la línea de succión.",
      "Transmitir potencia, lubricar partes móviles, disipar calor producido, sellar holguras y proteger contra la corrosión.",
      "Actuar como combustible alternativo, refrigerar el motor, lubricar la transmisión mecánica, sellar la cámara de combustión y filtrar gases.",
      "Transmitir potencia, generar corriente eléctrica, regular la presión de neumáticos, lubricar cadenas y disipar calor del freno."
    ],
    correct:1,
    justification:"Según el material de la Unidad 1 (GMON32), el aceite hidráulico debe cumplir exactamente cinco funciones: (1) Transmitir potencia — el fluido circula con bajas pérdidas desde la bomba al actuador; (2) Lubricar partes móviles — forma una película protectora que reduce fricción y desgaste en bombas, válvulas y cilindros; (3) Disipar calor — absorbe la energía térmica generada en el sistema y la transfiere al enfriador y al depósito; (4) Sellar holguras — la viscosidad del aceite rellena las tolerancias entre piezas, impidiendo fugas internas; y (5) Proteger contra la corrosión — el fluido no debe atacar los sellos, metales ni componentes del sistema."
  },
  {
    category:"Componentes Hidráulicos · Depósito",
    tagClass:"tag-comp",
    type:"Tecnicismo",
    question:"Un técnico nota que el aceite hidráulico de un camión minero Komatsu 930E está extremadamente sucio y con presencia de agua emulsionada, aun cuando no han transcurrido las 2000 horas de cambio. ¿Cuál es la función principal del depósito hidráulico que se ha visto más comprometida, además del almacenamiento?",
    options:[
      "La función de generar presión de succión para la bomba.",
      "La función de decantar particulado y sedimentos, además de segregar agua y aire del fluido, permitiendo que el aceite 'descanse' y se depure entre ciclos.",
      "La función de comprimir el aire para el sistema neumático de frenos.",
      "La función de regular el caudal máximo que circula por el circuito hidráulico."
    ],
    correct:1,
    justification:"El depósito de aceite hidráulico no es solo un contenedor: su función principal es dar el tiempo necesario para que el aceite disipe calor, decante el agua y sedimentos y segregue el aire disuelto o libre. Si el aceite presenta agua emulsionada y contaminación particulada excesiva, el depósito no está cumpliendo adecuadamente con la decantación y segregación de contaminantes, lo que puede deberse a un depósito subdimensionado, tiempos de retención insuficientes por exceso de caudal de retorno, o contaminación externa severa. La falla de estas funciones lleva a degradación acelerada del aceite y daño prematuro de los componentes del sistema."
  },
  // ─── BLOQUE 2: BOMBAS ───
  {
    category:"Bombas Oleohidráulicas · Tipos",
    tagClass:"tag-bomb",
    type:"Caso Práctico",
    question:"En el sistema de dirección y frenos de un buldócer Caterpillar D6T se utiliza un tipo específico de bomba hidráulica. Para el sistema de implementos (hoja y desgarrador), que requiere variación de caudal según la demanda, se selecciona otro tipo. ¿Cuál es la combinación técnicamente correcta y por qué?",
    options:[
      "Bomba de pistones para dirección (porque varía el caudal) y bomba de engranajes para implementos (porque son más silenciosas).",
      "Bomba de engranajes para dirección/frenos (caudal fijo, diseño simple y robusto para esta aplicación) y bomba de pistones axiales de caudal variable para implementos (permite variar el desplazamiento mediante la placa inclinada).",
      "Bomba de paletas de caudal fijo para ambos sistemas, ya que es la única bomba compatible con aceites minerales.",
      "Motor eléctrico de corriente continua para dirección y bomba de paletas para implementos, ya que los motores eléctricos generan presión directamente."
    ],
    correct:1,
    justification:"Las bombas de engranajes son de caudal positivo y fijo, con diseño simple y construcción robusta, lo que las hace ideales para sistemas de dirección y frenos donde se requiere un caudal constante y alta confiabilidad. Para los implementos (hoja y desgarrador), que requieren variaciones de velocidad y caudal según la posición de la placa de inclinación, las bombas de pistones axiales de caudal variable son la solución técnica: al modificar el ángulo de la placa oscilante, varían su desplazamiento volumétrico por revolución y por tanto el caudal entregado, sin necesidad de cambiar la velocidad de rotación del motor. Esta combinación es la arquitectura estándar en maquinaria pesada moderna."
  },
  {
    category:"Bombas Oleohidráulicas · Principio",
    tagClass:"tag-bomb",
    type:"Tecnicismo",
    question:"Un técnico en formación afirma que 'la bomba hidráulica genera la presión del sistema'. ¿Es esta afirmación correcta desde el punto de vista técnico?",
    options:[
      "Sí, completamente correcta: la bomba es el componente que genera directamente la presión de trabajo del sistema.",
      "No es correcta: la bomba convierte energía mecánica en caudal de fluido. La presión es un fenómeno que se genera al restringir ese caudal; si en el sistema no hay restricción al flujo, no hay presión. Son las válvulas y actuadores (resistencias hidráulicas) quienes determinan la presión.",
      "Parcialmente: la bomba genera presión pero solo cuando el aceite está frío y tiene alta viscosidad.",
      "No: la presión la genera exclusivamente la válvula de alivio al abrirse y descargar aceite al tanque."
    ],
    correct:1,
    justification:"Según el material de la Unidad 1: 'La presión es un fenómeno que se genera al restringir el caudal; si en el sistema no hay caudal no hay presión.' Las bombas convierten la energía mecánica del motor en energía hidráulica en forma de caudal de fluido. Cuando ese caudal encuentra resistencia (válvulas, actuadores, restricciones), se genera presión. Por eso, aunque las bombas deben diseñarse para soportar los requerimientos de presión del sistema, ellas no 'generan' presión directamente. Esta distinción conceptual es fundamental para entender el diagnóstico de fallas hidráulicas."
  },
  // ─── BLOQUE 3: VÁLVULAS ───
  {
    category:"Válvulas Oleohidráulicas · Presión",
    tagClass:"tag-valid",
    type:"Caso Práctico",
    question:"Durante la operación de un cilindro hidráulico de una excavadora, el operador intenta forzar el implemento más allá de su límite de carga. La presión del sistema sube bruscamente. ¿Qué componente actúa para proteger el sistema y cómo lo hace?",
    options:[
      "El filtro hidráulico, que al saturarse eleva la presión diferencial y protege la bomba.",
      "La válvula de alivio de presión, que al superar la presión predeterminada se abre y descarga el aceite al tanque, limitando la presión máxima del sistema y protegiendo sus componentes.",
      "El acumulador hidráulico, que absorbe el exceso de presión almacenándolo en forma de energía mecánica de resorte.",
      "La bomba de engranajes, que al detectar el exceso de presión revierte su giro para reducir el caudal."
    ],
    correct:1,
    justification:"Las válvulas de alivio de presión se utilizan para limitar la presión máxima del sistema, con el fin de proteger los componentes del exceso de presión. Cuando la presión del sistema supera el valor predeterminado (ajustado mediante el resorte de la válvula), esta se abre y descarga el aceite directamente al tanque, sin que fluya hacia el actuador. Existen válvulas de alivio de mando directo (fuerza hidráulica vs. tensión de resorte, sin amortiguación) y de mando indirecto (fuerza hidráulica vs. fuerza hidráulica, con comportamiento suave y amortiguado). Son el primer elemento de seguridad en todo circuito hidráulico."
  },
  {
    category:"Válvulas Oleohidráulicas · Tipos",
    tagClass:"tag-valid",
    type:"Tecnicismo",
    question:"En el esquema hidráulico de una motoniveladora se observan cuatro categorías de válvulas. ¿Cuál es la clasificación correcta y la función de cada categoría?",
    options:[
      "Válvulas de combustión (queman el aceite), válvulas de mezcla (mezclan agua con aceite), válvulas de electricidad (convierten presión en voltaje) y válvulas de enfriamiento.",
      "Válvulas de control direccional (dirigen el caudal al circuito deseado), válvulas de control de flujo (regulan velocidad de actuadores), válvulas de control de presión (limitan/reducen/secuencian presión) y válvulas de bloqueo (retención, impiden retroceso de flujo).",
      "Válvulas de admisión, válvulas de escape, válvulas de distribución y válvulas de purga, igual que en un motor de combustión.",
      "Solo existen dos tipos en sistemas hidráulicos: válvulas abiertas y válvulas cerradas."
    ],
    correct:1,
    justification:"Los sistemas oleohidráulicos utilizan cuatro categorías de válvulas: (1) Válvulas de control direccional — proporcionan el medio principal para controlar los actuadores, dirigiendo el caudal de aceite al circuito deseado; pueden accionarse manualmente, hidráulicamente, neumáticamente o electrónicamente. (2) Válvulas de control de flujo — regulan la velocidad de los actuadores o dividen el flujo; incluyen estranguladoras y reguladoras compensadas. (3) Válvulas de control de presión — incluyen válvulas de alivio (protección), válvulas de secuencia (alimentan circuitos secundarios a presión predeterminada) y reductoras (para circuitos secundarios de menor presión). (4) Válvulas de bloqueo o retención — permiten flujo en un solo sentido."
  },
  {
    category:"Válvulas Oleohidráulicas · Proporcionales y Servo",
    tagClass:"tag-valid",

let currentIndex=0,score=0,selectedIndex=null,answered=false;
let userAnswers=new Array(questions.length).fill(null);

const quizCard=document.getElementById('quizCard');
const optionsList=document.getElementById('optionsList');
const evalBtn=document.getElementById('evalBtn');
const feedbackPanel=document.getElementById('feedbackPanel');
const feedbackTitle=document.getElementById('feedbackTitle');
const feedbackJustification=document.getElementById('feedbackJustification');
const progressFill=document.getElementById('progressFill');
const qCounter=document.getElementById('qCounter');
const scoreCounter=document.getElementById('scoreCounter');
const resultsScreen=document.getElementById('resultsScreen');

function triggerAnim(el){el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');}

function renderQuestion(){
  const q=questions[currentIndex];
  qCounter.textContent=`PREGUNTA ${currentIndex+1} / ${questions.length}`;
  scoreCounter.textContent=`ACIERTOS ${score}/${questions.length}`;
  progressFill.style.width=(currentIndex/questions.length*100)+'%';
  document.getElementById('typeBadge').textContent=q.type;
  const cat=document.getElementById('categoryBadge');
  cat.textContent=q.category;cat.className='badge '+q.tagClass;
  document.getElementById('questionText').textContent=q.question;
  optionsList.innerHTML='';
  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.className='option';li.tabIndex=0;li.setAttribute('role','button');
    li.innerHTML=`<span class="option-letter">${String.fromCharCode(65+i)}</span><span class="option-text"></span>`;
    li.querySelector('.option-text').textContent=opt;
    li.addEventListener('click',()=>selectOption(i));
    li.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectOption(i);}});
    optionsList.appendChild(li);
  });
  selectedIndex=null;answered=false;
  feedbackPanel.hidden=true;feedbackPanel.className='feedback-panel';
  evalBtn.textContent='Evaluar Respuesta';evalBtn.disabled=true;
  evalBtn.onclick=evaluateAnswer;
  triggerAnim(quizCard);
}

function selectOption(i){
  if(answered)return;
  selectedIndex=i;
  optionsList.querySelectorAll('.option').forEach((el,idx)=>el.classList.toggle('selected',idx===i));
  evalBtn.disabled=false;
}

function evaluateAnswer(){
  if(selectedIndex===null||answered)return;
  answered=true;
  const q=questions[currentIndex];
  optionsList.querySelectorAll('.option').forEach((el,idx)=>{
    el.classList.add('disabled');el.tabIndex=-1;
    if(idx===q.correct)el.classList.add('correct-answer');
    if(idx===selectedIndex&&idx!==q.correct)el.classList.add('incorrect-answer');
  });
  const ok=selectedIndex===q.correct;
  userAnswers[currentIndex]=ok;
  if(ok)score++;
  scoreCounter.textContent=`ACIERTOS ${score}/${questions.length}`;
  progressFill.style.width=((currentIndex+1)/questions.length*100)+'%';
  feedbackPanel.hidden=false;
  feedbackPanel.className='feedback-panel '+(ok?'feedback-correct':'feedback-incorrect');
  feedbackTitle.textContent=ok?'✅ Respuesta Correcta':'❌ Respuesta Incorrecta';
  feedbackJustification.textContent=q.justification;
  evalBtn.disabled=false;
  evalBtn.textContent=(currentIndex===questions.length-1)?'Ver Resultados':'Siguiente Pregunta';
  evalBtn.onclick=()=>{
    if(currentIndex===questions.length-1){showResults();}
    else{currentIndex++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
  };
}

function showResults(){
  quizCard.hidden=true;resultsScreen.hidden=false;triggerAnim(resultsScreen);
  const pct=Math.round(score/questions.length*100);
  document.getElementById('resultScoreText').textContent=`${score}/${questions.length}`;
  document.getElementById('resultPct').textContent=`${pct}%`;
  let msg,color;
  if(pct>=90){msg='¡Excelente! Dominas los sistemas hidráulicos y neumáticos. Estás listo para el examen.';color='var(--accent-green)';}
  else if(pct>=70){msg='Buen manejo del contenido. Repasa los temas marcados en rojo antes del examen.';color='var(--accent-green)';}
  else if(pct>=50){msg='Nivel intermedio. Refuerza los conceptos de válvulas, automatización y LOTO.';color='var(--accent-amber)';}
  else{msg='Necesitas repasar el material de componentes hidráulicos, automatización y mantenimiento.';color='var(--accent-red)';}
  document.getElementById('resultMessage').textContent=msg;
  const circ=2*Math.PI*85;
  const gf=document.getElementById('gaugeFill');
  gf.style.stroke=color;gf.style.strokeDasharray=circ;gf.style.strokeDashoffset=circ;
  requestAnimationFrame(()=>setTimeout(()=>{gf.style.strokeDashoffset=circ-(circ*pct/100);},80));
  const grid=document.getElementById('breakdownGrid');
  grid.innerHTML='';
  userAnswers.forEach((ans,i)=>{
    const d=document.createElement('div');
    d.className='led '+(ans?'led-correct':'led-incorrect');
    d.textContent=String(i+1);d.title=questions[i].category;
    grid.appendChild(d);
  });
}

function restart(){
  currentIndex=0;score=0;selectedIndex=null;answered=false;
  userAnswers=new Array(questions.length).fill(null);
  resultsScreen.hidden=true;quizCard.hidden=false;
  renderQuestion();window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('restartBtn').addEventListener('click',restart);
renderQuestion();
</script>
</body>
</html>
